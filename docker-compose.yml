services:
  redis:
    image: redis:8.8.0-alpine
    ports:
      - "6379:6379"
    healthcheck:
        test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    
  worker:
    build: .
    command: celery -A worker.celery_app worker --loglevel=info --concurrency=1
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - .:/app
    
